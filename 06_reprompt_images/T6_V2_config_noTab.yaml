# Ablation text-only : toutes les features tabulaires omises.
# Teste le modèle sur IRM seule (même checkpoint, prompt purgé).
# use_visual=true, tabular_features=[]
# Modèle source : T6_V2
# Checkpoint    : results/06_if_v2/best_model
# Usage :
#   python evaluate.py \
#       --checkpoint results/06_if_v2/best_model \
#       --config <path>/T6_V2_config_noTab.yaml \
#       --split test  --threshold-source val \
#       --output results/ablation/06_if_v2_noTab
#   (remplacer --split test par --split val pour la validation)

task_name: 06_if_v2_noTab
inherits_from: ../config/config_base.yaml

mmse_head:
  enabled: false

prompt:
  mode: image_focused
  variant: v2

data:
  use_tabular: false
  tabular_features: []  # liste vide → 'No clinical data provided.'
  use_visual: true

logging:
  run_name: 06_if_v2_noTab_fold0

training:
  output_dir: results/ablation/06_if_v2_noTab
