# Ablation vision-only : images IRM remplacées par des zéros.
# Teste le modèle sur données textuelles seules (16 features cliniques).
# use_tabular=true, use_visual=false → pixel_values = torch.zeros
# Modèle source : T6_ic
# Checkpoint    : results/06_image_centric/best_model
# Usage :
#   python evaluate.py \
#       --checkpoint results/06_image_centric/best_model \
#       --config <path>/T6_ic_config_noVis.yaml \
#       --split test  --threshold-source val \
#       --output results/ablation/06_image_centric_noVis
#   (remplacer --split test par --split val pour la validation)

task_name: 06_image_centric_noVis
inherits_from: ../config/config_base.yaml

mmse_head:
  enabled: false

prompt:
  mode: image_centric

data:
  use_tabular: true
  use_visual: false   # pixel_values = zeros → MedSigLIP embedding neutre

logging:
  run_name: 06_image_centric_noVis_fold0

training:
  output_dir: results/ablation/06_image_centric_noVis
